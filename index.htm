<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Планувальник подій</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>
<body>

<div class="container">

<h1>Планувальник подій</h1>

<form method="POST">

<input type="text" name="name" placeholder="Назва події" required>

<input type="date" name="date">

<input type="time" name="time">

<select name="priority">

<option>Низький</option>
<option>Середній</option>
<option>Високий</option>

</select>

<button type="submit">Додати</button>

</form>

<ul>

{% for event in events %}

<li>

<strong>{{ event.name }}</strong>
{{ event.date }}
{{ event.time }}
{{ event.priority }}

<a href="/delete/{{ loop.index0 }}">❌</a>

</li>

{% endfor %}

</ul>

</div>

</body>
</html>
